<div class="header-bar">
  <a href="{{ "/" | relURL }}" class="site-title">{{ site.Title }}</a>
  <div class="menu-wrapper">
    <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    <div class="nav-menu">
      {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
      <div class="theme-toggle" role="button" tabindex="0" aria-label="Toggle dark mode">
        <span class="theme-toggle-label">Light mode</span>
        <span class="theme-toggle-icon">☀️</span>
      </div>
    </div>
  </div>
</div>
<div class="menu-overlay"></div>
<script>
(function() {
  const btn = document.querySelector('.hamburger');
  const menu = document.querySelector('.nav-menu');
  const overlay = document.querySelector('.menu-overlay');

  function toggleMenu() {
    const isOpen = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
    menu.classList.toggle('open', !isOpen);
    overlay.classList.toggle('open', !isOpen);
  }

  function closeMenu() {
    btn.setAttribute('aria-expanded', 'false');
    menu.classList.remove('open');
    overlay.classList.remove('open');
  }

  btn.addEventListener('click', toggleMenu);
  overlay.addEventListener('click', closeMenu);

  // Dark mode toggle
  const toggle = document.querySelector('.theme-toggle');
  const toggleLabel = toggle.querySelector('.theme-toggle-label');
  const toggleIcon = toggle.querySelector('.theme-toggle-icon');

  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      toggleLabel.textContent = 'Dark mode';
      toggleIcon.textContent = '🌙';
    } else {
      document.documentElement.removeAttribute('data-theme');
      toggleLabel.textContent = 'Light mode';
      toggleIcon.textContent = '☀️';
    }
  }

  const saved = localStorage.getItem('theme');
  if (saved) applyTheme(saved);

  toggle.addEventListener('click', function(e) {
    e.stopPropagation();
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    const next = isLight ? 'dark' : 'light';
    localStorage.setItem('theme', next);
    applyTheme(next);
  });

  toggle.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggle.click();
    }
  });
})();
</script>
