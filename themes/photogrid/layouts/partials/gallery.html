<div id="gallery" class="pswp-gallery" style="visibility: hidden">
  {{ range . }}
    {{ if not .Params.private }}
      {{ $page := . }}
      {{ range where (.Resources.ByType "image") "Params.display" "eq" true }}
        <div class="gallery-item" data-categories="{{ range $i, $cat := $page.Params.categories }}{{ if $i }},{{ end }}{{ $cat | lower }}{{ end }}">
          <a href="{{ .RelPermalink }}"
             data-pswp-width="{{ .Width }}"
             data-pswp-height="{{ .Height }}"
             target="_blank">
            <img src="{{ .RelPermalink }}"
                 width="{{ .Width }}"
                 height="{{ .Height }}"
                 alt="{{ $page.Title }}"
                 loading="lazy">
          </a>
          <a class="view-page-btn" href="{{ $page.RelPermalink }}" target="_blank" rel="noopener"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> View Page</a>
        </div>
      {{ end }}
    {{ end }}
  {{ end }}
</div>
