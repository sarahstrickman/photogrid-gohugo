<div id="gallery" class="pswp-gallery" style="visibility: hidden">
  {{ range . }}
    {{ if not .Params.private }}
      {{ $page := . }}
      {{ range where (.Resources.ByType "image") "Params.display" "eq" true }}
        <div class="gallery-item" data-categories="{{ range $i, $cat := $page.Params.categories }}{{ if $i }},{{ end }}{{ $cat | lower }}{{ end }}" data-page-url="{{ $page.RelPermalink }}">
          <a href="{{ .RelPermalink }}"
             data-pswp-width="{{ .Width }}"
             data-pswp-height="{{ .Height }}"
             target="_blank">
            <img src="{{ .RelPermalink }}"
                 width="{{ .Width }}"
                 height="{{ .Height }}"
                 alt="{{ $page.Title }}"
                 loading="lazy">
          </a>
          <div class="gallery-item-overlay">
            <a class="view-page-btn" href="{{ $page.RelPermalink }}" target="_blank" onclick="event.stopPropagation();">View Page</a>
          </div>
        </div>
      {{ end }}
    {{ end }}
  {{ end }}
</div>
