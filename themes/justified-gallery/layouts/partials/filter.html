<div class="filter-bar">
  <div class="filter-wrapper">
    <button class="filter-btn" aria-label="Filter by category" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
    </button>
    <div class="filter-menu">
      <div class="filter-menu-header">Filter by Category</div>
      <div class="filter-options">
        {{ range $name, $pages := site.Taxonomies.categories }}
          <label class="filter-option">
            <input type="checkbox" value="{{ $name }}" checked>
            <span>{{ $name | humanize | title }}</span>
          </label>
        {{ end }}
      </div>
      <div class="filter-actions">
        <button class="filter-clear-btn" type="button">Clear All</button>
        <button class="filter-all-btn" type="button">Select All</button>
      </div>
    </div>
  </div>
  <div class="filter-overlay"></div>
</div>
